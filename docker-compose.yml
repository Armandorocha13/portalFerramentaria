version: "3.9"

services:
  portal-ferramentaria:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal_ferramentaria
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:80" ]
      interval: 30s
      timeout: 10s
      retries: 3
