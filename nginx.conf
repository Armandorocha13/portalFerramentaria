server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Todas as rotas desconhecidas serao redirecionadas para o root do react
    # Isso impede erro 404 ao recarregar a pagina no navegador (SPA Routing Protocol)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de arquivos estaticos por 1 ano (JS, CSS, Imagens gerados via Vite/Rollup com Hash)
    location ~* \.(?:css|js|jpeg|jpg|png|svg|ico|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }
}
